name: Demos aktualisieren

# Sammelt mehrmals täglich frische Demo-Termine und committet sie,
# damit die gehostete Seite (GitHub Pages) automatisch aktuell bleibt.

on:
  schedule:
    - cron: "17 4 * * *"    # täglich 04:17 UTC (~06:17 Sommerzeit)
    - cron: "17 14 * * *"   # täglich 14:17 UTC (~16:17 Sommerzeit)
  workflow_dispatch:         # erlaubt manuelles Auslösen im Actions-Tab

permissions:
  contents: write

concurrency:
  group: update-daten
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Termine sammeln
        run: node scrape.mjs

      - name: Änderungen committen
        run: |
          git config user.name "demomelder-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demos.js demos.json
          if git diff --cached --quiet; then
            echo "Keine Änderung, nichts zu committen."
          else
            git commit -m "Daten aktualisiert ($(date -u +%FT%TZ))"
            git push
          fi
